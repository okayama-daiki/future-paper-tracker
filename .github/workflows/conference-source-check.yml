name: Weekly conference refresh

on:
  schedule:
    # Monday 06:17 JST. This workflow uses deterministic parsers only; no LLM is called.
    - cron: "17 21 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: weekly-conference-refresh
  cancel-in-progress: false

jobs:
  refresh:
    name: Refresh, verify, and commit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout main
        uses: actions/checkout@v6.0.2
        with:
          ref: main

      - name: Setup vp
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Apply deterministic conference updates
        run: vp run automation:update-conferences -- --output=deterministic-update-report.json

      - name: Detect data changes
        id: changes
        shell: bash
        run: |
          if git diff --quiet -- data/conferences.json apps/website/public/conferences.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check
        run: vp check

      - name: Test
        run: vp test

      - name: Setup Pages
        uses: actions/configure-pages@v5.0.0

      - name: Build website
        run: vp run website#build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4.0.0
        with:
          path: apps/website/dist

      - name: Commit and push data
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/conferences.json apps/website/public/conferences.json
          git commit -m "chore(data): weekly deterministic conference refresh"
          git push origin HEAD:main

      - name: Upload update report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deterministic-conference-update-report
          path: deterministic-update-report.json
          if-no-files-found: warn
          retention-days: 30

  deploy:
    name: Deploy to GitHub Pages
    needs: refresh
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4.0.5
