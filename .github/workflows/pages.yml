name: Pages

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup vp
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Lint
        run: vp lint

      - name: Format
        run: vp fmt --check

      - name: Test
        run: vp test --passWithNoTests

      - name: Build
        run: vp run build -r

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup vp
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true

      - name: Setup Pages
        uses: actions/configure-pages@v5.0.0

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Build for Pages
        run: vp run build -r

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4.0.0
        with:
          path: apps/website/dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4.0.5
