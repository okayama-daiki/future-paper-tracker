name: Pages

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.1.3
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.1.3
        with:
          bun-version: latest

      - name: Setup Pages
        uses: actions/configure-pages@v5.0.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build for Pages
        run: |
          bunx tsc -b
          bunx vite build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4.0.0
        with:
          path: dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4.0.5
